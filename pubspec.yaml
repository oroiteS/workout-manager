name: workout_manager
description: 极简健身重量记录工具
publish_to: 'none'
version: 1.1.4+15

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  table_calendar: ^3.1.0
  file_picker: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.14

hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
  assets:
    - assets/exercises/catalog.json
    - assets/exercises/gifs/
